# OpenPAVE Impeccable
# Design skills for AI agents — polish, audit, animate, and more
# Wraps pbakaus/impeccable SKILL.md skills as executable commands
# so they appear in the slash command menu

name: design
version: 1.0.0
description: "20 design skills for AI agents: polish, audit, animate, bolder, critique, and more. Based on pbakaus/impeccable."

author:
  name: cnrai
  url: https://github.com/cnrai

license: MIT
homepage: https://github.com/cnrai/openpave-impeccable
repository: cnrai/openpave-impeccable

pattern: sandbox
entrypoint: index.js

commands:
  - name: polish
    description: Final quality pass — fixes alignment, spacing, consistency, and detail issues
    args:
      - "[target]"
    options:
      - --json

  - name: audit
    description: Comprehensive quality audit across accessibility, performance, theming, and responsive design
    args:
      - "[area]"
    options:
      - --json

  - name: animate
    description: Add purposeful animations, micro-interactions, and motion effects
    args:
      - "[target]"
    options:
      - --json

  - name: adapt
    description: Adapt interface for a specific target (mobile, tablet, desktop, print, email)
    args:
      - "[target]"
    options:
      - --json

  - name: arrange
    description: Improve layout, alignment, and spatial relationships
    args:
      - "[target]"
    options:
      - --json

  - name: bolder
    description: Amplify safe or boring designs to be more visually striking
    args:
      - "[target]"
    options:
      - --json

  - name: clarify
    description: Fix unclear copy, labels, and messaging
    args:
      - "[target]"
    options:
      - --json

  - name: colorize
    description: Improve color usage, palette, and color relationships
    args:
      - "[target]"
    options:
      - --json

  - name: critique
    description: Honest design review with actionable feedback
    args:
      - "[area]"
    options:
      - --json

  - name: delight
    description: Add moments of joy and delightful interactions
    args:
      - "[target]"
    options:
      - --json

  - name: distill
    description: Simplify and remove excess — less is more
    args:
      - "[target]"
    options:
      - --json

  - name: extract
    description: Extract reusable components from existing code
    args:
      - "[target]"
    options:
      - --json

  - name: frontend-design
    description: Build distinctive, production-grade frontend interfaces from scratch
    args:
      - "[description]"
    options:
      - --json

  - name: harden
    description: Improve resilience, error handling, and edge cases
    args:
      - "[target]"
    options:
      - --json

  - name: normalize
    description: Align with design system conventions and tokens
    args:
      - "[target]"
    options:
      - --json

  - name: onboard
    description: Add onboarding UX — tooltips, walkthroughs, empty states
    args:
      - "[target]"
    options:
      - --json

  - name: optimize
    description: Performance optimization — speed, bundle size, rendering
    args:
      - "[target]"
    options:
      - --json

  - name: overdrive
    description: Push design to the extreme — maximum visual impact
    args:
      - "[target]"
    options:
      - --json

  - name: typeset
    description: Improve typography — hierarchy, spacing, font choices
    args:
      - "[target]"
    options:
      - --json

  - name: teach
    description: One-time setup — gathers design context and saves to .impeccable.md
    options:
      - --json

tokens: {}

permissions:
  fs.read:
    - "*"
  fs.write:
    - "tmp/*"
    - /tmp/*
  network:
    - api.github.com
    - raw.githubusercontent.com
  modules:
    - fs
    - path
  system:
    - node
    - mkdir
    - curl

platforms:
  - darwin
  - linux
  - win32

engines:
  node: ">=16.0.0"

keywords:
  - design
  - frontend
  - polish
  - audit
  - accessibility
  - animation
  - typography
  - impeccable
  - pbakaus
  - ui
  - ux

category: development
icon: "\U0001F3A8"
